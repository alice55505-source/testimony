<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申言稿編輯器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes ping { 75%,100%{transform:scale(2);opacity:0} }
    @keyframes pulse { 50%{opacity:.5} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes zoomIn { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-ping { animation: ping 1s cubic-bezier(0,0,.2,1) infinite; }
    .animate-pulse { animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }
    .animate-fade { animation: fadeIn 0.5s ease forwards; }
    .animate-zoom { animation: zoomIn 0.5s ease forwards; }
    .animate-slide { animation: slideUp 0.7s ease forwards; }
    .active-scale:active { transform: scale(0.95); }
    textarea { resize: none; outline: none; border: none; background: transparent; width: 100%; }
  </style>
</head>
<body>
<div id="app" class="min-h-screen flex flex-col bg-[#F8FAFC]"></div>

<script type="module">
// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  audioFiles: [],
  sessionResult: null,
  activeTab: 'task',
  selectedAudience: 'adult',
  apiKey: '',
};

let activeTaskId = null;
let logEndEl = null;

const audienceOptions = [
  { value: 'youth',   label: '兒童', desc: '活潑' },
  { value: 'adult',   label: '成人', desc: '專業' },
  { value: 'elderly', label: '長輩', desc: '親切' },
];

function getAudienceLabel(type) {
  switch(type) {
    case 'youth':   return '兒童/青少年';
    case 'elderly': return '不識字長輩';
    default:        return '成年人';
  }
}

// ─── Gemini API Calls ─────────────────────────────────────────────────────────
async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function geminiRequest(body) {
  const key = state.apiKey;
  if (!key) throw new Error('請先輸入 Gemini API Key');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API 錯誤: ${res.status}`);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function transcribeAudio(audioParts) {
  const parts = [
    { text: `你是一個專業的繁體中文（含閩南語/台語詞彙）逐字稿辨識員。
請將以下音訊完整轉錄，保留所有口語、停頓詞（例如：嗯、啊、那個、就是），以及台語詞彙的音譯。
不要潤飾或更改任何內容，要一字不漏地還原說話者的原話。
輸出格式：只輸出逐字稿文字，不需要任何說明或標題。` },
    ...audioParts.map(p => ({
      inlineData: { mimeType: p.mimeType, data: p.base64Data }
    }))
  ];

  return await geminiRequest({
    contents: [{ parts }],
    generationConfig: { temperature: 0.1 }
  });
}

async function generateTestimony(transcript, audienceType) {
  const audienceDesc = {
    youth:   '兒童或青少年，語氣要活潑、簡單易懂，多用比喻，字數約 300-500 字',
    adult:   '成年弟兄姊妹，語氣莊重、流暢，使用召會常用語，字數約 400-600 字',
    elderly: '不識字的長輩，語氣親切口語，用簡單詞彙，字數約 300-450 字',
  }[audienceType];

  const text = await geminiRequest({
    contents: [{
      parts: [{ text: `你是一位有豐富召會服事經驗的弟兄，精通中文和台語，擅長整理蒙恩見證稿。

以下是一段蒙恩見證的原始錄音逐字稿：

---
${transcript}
---

請根據這份逐字稿，為【${audienceDesc}】整理一份蒙恩見證稿。

要求：
1. 保留見證的核心內容和關鍵轉折點
2. 使用召會常用語（主、主恩、生命、靈、享受主、蒙恩等）
3. 去除口語贅詞（嗯、啊等），文字流暢自然
4. 語氣和用詞要符合說話對象
5. 結構清晰：背景→問題→轉機→蒙恩→結論/感謝

輸出格式（JSON）：
{
  "verbatim": "整理後的逐字稿（修正口語錯誤但不改變內容）",
  "testimony": "完整蒙恩見證稿",
  "wordCount": 數字
}

只輸出 JSON，不要任何說明文字。` }]
    }],
    generationConfig: { temperature: 0.7 }
  });

  // parse JSON
  const cleaned = text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  try {
    return JSON.parse(cleaned);
  } catch(e) {
    // fallback: just use testimony = text
    return { verbatim: transcript, testimony: text, wordCount: text.length };
  }
}

// ─── Process ──────────────────────────────────────────────────────────────────
function addLog(msg) {
  if (!state.sessionResult) return;
  const time = new Date().toLocaleTimeString();
  state.sessionResult.systemLogs.push(`[${time}] ${msg}`);
  render();
  setTimeout(() => {
    if (logEndEl) logEndEl.scrollIntoView({ behavior: 'smooth' });
  }, 50);
}

async function startFullProcess(files, audience) {
  const taskId = Date.now().toString();
  activeTaskId = taskId;
  state.activeTab = 'task';

  const fileStatus = {};
  files.forEach(f => fileStatus[f.id] = 'preparing');

  state.sessionResult = {
    filename: files.length > 1 ? `${files[0].file.name} 等 ${files.length} 個檔案` : files[0].file.name,
    verbatimTranscript: '',
    testimony: '',
    wordCount: 0,
    audienceType: audience,
    status: 'processing_recognition',
    currentStep: 1,
    fileStatus,
    systemLogs: [`系統啟動：對象設定為【${getAudienceLabel(audience)}】，開始處理 ${files.length} 個檔案...`],
  };
  render();

  try {
    const audioParts = [];
    for (const af of files) {
      if (activeTaskId !== taskId) return;
      addLog(`正在讀取檔案：${af.file.name}`);
      const base64 = await fileToBase64(af.file);
      audioParts.push({ base64Data: base64, mimeType: af.file.type });
      state.sessionResult.fileStatus[af.id] = 'processing';
      render();
    }

    addLog('檔案讀取完成，開始極速語音辨識（一字不漏）...');
    const rawText = await transcribeAudio(audioParts);

    if (activeTaskId !== taskId) return;

    files.forEach(f => state.sessionResult.fileStatus[f.id] = 'done');
    state.sessionResult.verbatimTranscript = rawText;
    state.sessionResult.status = 'ready_to_transform';
    addLog('語音辨識完成，自動進入蒙恩見證稿編寫階段...');
    render();

    // auto transform
    state.sessionResult.status = 'processing_transform';
    state.sessionResult.currentStep = 2;
    addLog(`正在為【${getAudienceLabel(audience)}】調整語氣並整理內容...`);
    render();

    const data = await generateTestimony(rawText, audience);

    if (activeTaskId !== taskId) return;

    state.sessionResult.verbatimTranscript = data.verbatim;
    state.sessionResult.testimony = data.testimony;
    state.sessionResult.wordCount = data.wordCount;
    state.sessionResult.status = 'completed';
    addLog('全自動處理完畢！已產出專屬風格見證。');
    state.activeTab = 'testimony';
    render();

  } catch(err) {
    if (activeTaskId !== taskId) return;
    addLog(`錯誤：${err.message}`);
    state.sessionResult.status = 'error';
    state.sessionResult.error = err.message;
    render();
  }
}

function cancelProcess() {
  activeTaskId = null;
  state.sessionResult = null;
  state.audioFiles = [];
  state.activeTab = 'task';
  render();
}

function copyToClipboard(text) {
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    showToast('內容已複製到剪貼簿！');
  });
}

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-2xl z-50 transition-all';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function getTabClass(tab, disabled) {
  const base = 'px-10 py-5 text-sm font-black transition-all border-b-4 uppercase tracking-widest flex items-center gap-2 whitespace-nowrap';
  if (disabled) return `${base} border-transparent text-slate-300 cursor-not-allowed opacity-50`;
  if (state.activeTab === tab) return `${base} border-indigo-600 text-indigo-600 bg-indigo-50/50`;
  return `${base} border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50 cursor-pointer`;
}

function isProcessing() {
  const s = state.sessionResult?.status;
  return s && s !== 'completed' && s !== 'error';
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;

  const sr = state.sessionResult;
  const processing = isProcessing();

  app.innerHTML = `
  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between gap-4 sticky top-0 z-30 shadow-sm" style="backdrop-filter:blur(12px);background:rgba(255,255,255,0.92)">
    <div class="flex items-center gap-3 shrink-0">
      <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
      </div>
      <h1 class="text-lg font-black text-slate-900 leading-none tracking-tight hidden sm:block">申言稿編輯器</h1>
    </div>

    <!-- Audience selector -->
    <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
      ${audienceOptions.map(opt => `
        <button onclick="selectAudience('${opt.value}')" ${processing ? 'disabled' : ''} 
          class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${state.selectedAudience === opt.value ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'} ${processing ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}">
          ${opt.label}
        </button>
      `).join('')}
    </div>

    <div class="flex items-center gap-3">
      ${sr ? `<div class="hidden lg:flex items-center gap-2 mr-4 overflow-hidden max-w-[200px]">
        <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter whitespace-nowrap">處理檔案：</span>
        <span class="text-xs font-medium text-slate-600 truncate">${sr.filename}</span>
      </div>` : ''}
      
      <!-- API Key input -->
      <input id="apiKeyInput" type="password" placeholder="Gemini API Key" value="${state.apiKey}"
        oninput="state.apiKey = this.value"
        class="hidden sm:block border border-slate-200 rounded-xl px-3 py-2 text-xs font-mono w-44 focus:outline-none focus:border-indigo-400 text-slate-600 bg-slate-50" />

      <button onclick="document.getElementById('fileInput').click()" ${processing ? 'disabled' : ''}
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-2.5 px-6 rounded-xl text-sm transition-all shadow-lg flex items-center gap-2 active-scale ${processing ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span class="hidden sm:inline">上傳音檔</span>
        <span class="sm:hidden">上傳</span>
      </button>

      ${sr ? `<button onclick="cancelProcess()" class="p-2 text-slate-300 hover:text-red-500 transition-colors cursor-pointer" title="重新開始">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>` : ''}
    </div>
    <input type="file" id="fileInput" accept="audio/*" multiple class="hidden" onchange="handleFileUpload(event)" />
  </header>

  <!-- Main -->
  <main class="flex-1 flex flex-col overflow-hidden" style="min-height: calc(100vh - 64px)">
    ${!sr ? renderLanding() : renderWorkspace(sr)}
  </main>
  `;

  logEndEl = document.getElementById('logEnd');
  if (logEndEl) logEndEl.scrollIntoView({ behavior: 'instant' });
}

function renderLanding() {
  return `
  <div class="flex-1 flex flex-col items-center justify-center p-12 text-center animate-fade">
    <div class="max-w-xl w-full">
      <div class="w-24 h-24 bg-indigo-50 text-indigo-500 rounded-[2rem] flex items-center justify-center mb-8 mx-auto shadow-inner animate-pulse">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
      </div>
      <h2 class="text-4xl font-black text-slate-900 mb-6 tracking-tight leading-tight">讓生命見證被更完美地記錄</h2>
      <p class="text-slate-500 text-lg leading-relaxed mb-10">
        從上方選擇 <span class="text-indigo-600 font-bold underline underline-offset-4">說話對象</span> 並 <span class="text-indigo-600 font-bold underline underline-offset-4">上傳錄音</span>，<br/>系統將自動轉錄並根據不同群體編排最合適的語氣。
      </p>
      <div class="flex justify-center gap-4 flex-wrap">
        ${audienceOptions.map(opt => `
          <div class="px-6 py-4 rounded-2xl border-2 transition-all cursor-default ${state.selectedAudience === opt.value ? 'bg-white border-indigo-600 shadow-xl' : 'bg-slate-50 border-slate-100 opacity-50'}">
            <div class="text-sm font-black ${state.selectedAudience === opt.value ? 'text-indigo-600' : 'text-slate-400'}">${opt.label}對象</div>
          </div>
        `).join('')}
      </div>
      <p class="text-slate-400 text-xs mt-8">請在右上角輸入您的 Gemini API Key 以啟用 AI 功能</p>
    </div>
  </div>`;
}

function renderWorkspace(sr) {
  const processing = isProcessing();
  const activeTabContent = renderTabContent(sr);
  const verbatimDisabled = !sr.verbatimTranscript;
  const testimonyDisabled = sr.status !== 'completed';

  return `
  <!-- Tab bar -->
  <div class="bg-white border-b border-slate-200 flex flex-col md:flex-row items-stretch md:items-center px-6 shadow-sm overflow-x-auto">
    <nav class="flex items-stretch flex-1">
      <button onclick="setTab('task')" class="${getTabClass('task', false)}">
        工作狀態
        ${processing ? '<span class="ml-2 w-2 h-2 bg-indigo-500 rounded-full animate-ping"></span>' : ''}
      </button>
      <button onclick="setTab('verbatim')" ${verbatimDisabled ? 'disabled' : ''} class="${getTabClass('verbatim', verbatimDisabled)}">原始逐字稿</button>
      <button onclick="setTab('testimony')" ${testimonyDisabled ? 'disabled' : ''} class="${getTabClass('testimony', testimonyDisabled)}">蒙恩見證稿</button>
    </nav>
    
    <div class="py-3 md:py-0 flex items-center gap-4 ml-auto">
      ${sr.status === 'completed' ? `
        <button onclick="copyActiveTab()" 
          class="flex items-center gap-2 px-6 py-2 bg-slate-900 text-white rounded-xl text-sm font-black shadow-lg hover:bg-black transition-all active-scale whitespace-nowrap cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
          複製本頁
        </button>
      ` : ''}
      <div class="hidden sm:block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] bg-slate-100 px-4 py-1.5 rounded-full">
        字數: ${sr.wordCount}
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto bg-white">
    <div class="w-full max-w-none px-6 md:px-12 py-8 min-h-full flex flex-col">
      ${activeTabContent}
    </div>
  </div>`;
}

function renderTabContent(sr) {
  if (state.activeTab === 'task') return renderTaskTab(sr);
  if (state.activeTab === 'verbatim') return renderVerbatimTab(sr);
  if (state.activeTab === 'testimony') return renderTestimonyTab(sr);
  return '';
}

function renderTaskTab(sr) {
  let statusBlock = '';
  if (sr.status === 'completed') {
    statusBlock = `
      <div class="space-y-4">
        <div class="w-20 h-20 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto shadow-xl">
          <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h3 class="text-2xl font-black text-slate-800">風格編修完成</h3>
        <div class="inline-block px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-xs font-black border border-indigo-100 uppercase tracking-widest">
          對象：${getAudienceLabel(sr.audienceType)}
        </div>
      </div>`;
  } else if (sr.status === 'error') {
    statusBlock = `
      <div class="space-y-4">
        <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <p class="text-red-600 font-bold">${sr.error}</p>
        <button onclick="retryProcess()" class="bg-white border border-red-200 px-6 py-2 rounded-xl text-sm font-bold text-red-600 hover:bg-red-50 cursor-pointer">重試</button>
      </div>`;
  } else {
    statusBlock = `
      <div class="space-y-8">
        <div class="relative w-24 h-24 mx-auto">
          <div class="absolute inset-0 border-[6px] border-slate-200 rounded-full"></div>
          <div class="absolute inset-0 border-[6px] border-transparent border-t-indigo-600 rounded-full animate-spin"></div>
        </div>
        <div class="space-y-2">
          <p class="text-indigo-600 font-black tracking-[0.2em] uppercase text-sm animate-pulse">見證整理中</p>
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">
            ${sr.status === 'processing_recognition' ? '正在辨識語音...' : '正在套用風格語氣...'}
          </p>
        </div>
      </div>`;
  }

  return `
  <div class="max-w-6xl mx-auto w-full flex-1 space-y-8 animate-fade">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 h-full">
      <div class="lg:col-span-4 bg-slate-50 p-10 rounded-[2.5rem] border border-slate-100 text-center flex flex-col justify-center shadow-inner">
        ${statusBlock}
      </div>

      <div class="lg:col-span-8 bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl h-[400px] flex flex-col border-4 border-slate-800 relative overflow-hidden group">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
        <div class="flex items-center justify-between mb-4 border-b border-slate-800/50 pb-3">
          <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">系統運行日誌</span>
          <div class="flex gap-1.5 opacity-30 group-hover:opacity-100 transition-opacity">
            <div class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-amber-500"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
          </div>
        </div>
        <div class="flex-1 overflow-y-auto space-y-2 text-[12px] font-mono text-indigo-400/90 leading-relaxed scrollbar-hide">
          ${sr.systemLogs.map((log, i) => `
            <div class="flex gap-4 border-l border-slate-800/50 pl-4 py-0.5">
              <span class="text-slate-600 shrink-0 select-none">${String(i+1).padStart(3,'0')}</span>
              <span class="break-all">${log}</span>
            </div>
          `).join('')}
          <div id="logEnd"></div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderVerbatimTab(sr) {
  return `
  <div class="max-w-7xl mx-auto w-full bg-slate-50 border border-slate-200 rounded-[3rem] p-12 md:p-16 shadow-inner animate-zoom">
    <div class="mb-12 flex items-center gap-6">
      <h3 class="text-3xl font-black text-slate-800 shrink-0">原始錄音逐字稿</h3>
      <div class="h-[2px] w-full bg-slate-200 rounded-full"></div>
    </div>
    <div class="whitespace-pre-wrap leading-loose text-slate-600 text-xl font-medium tracking-wide" style="user-select:text">
      ${sr.verbatimTranscript}
    </div>
  </div>`;
}

function renderTestimonyTab(sr) {
  return `
  <div class="max-w-7xl mx-auto w-full bg-white border-2 border-indigo-100 rounded-[4rem] p-12 md:p-24 shadow-2xl animate-slide relative overflow-hidden">
    <!-- deco -->
    <div class="absolute top-0 right-0 p-16 opacity-[0.03] pointer-events-none select-none">
      <svg class="w-80 h-80 text-indigo-600" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21L14.017 18C14.017 16.8954 14.9124 16 16.017 16H19.017C19.5693 16 20.017 15.5523 20.017 15V9C20.017 8.44772 19.5693 8 19.017 8H16.017C14.9124 8 14.017 7.10457 14.017 6V3L21.017 3V15C21.017 18.3137 18.3307 21 15.017 21H14.017ZM3.0166 21L3.0166 18C3.0166 16.8954 3.91203 16 5.0166 16H8.0166C8.56888 16 9.0166 15.5523 9.0166 15V9C9.0166 8.44772 8.56888 8 8.0166 8H5.0166C3.91203 8 3.0166 7.10457 3.0166 6V3L10.0166 3V15C10.0166 18.3137 7.3303 21 4.0166 21H3.0166Z"/></svg>
    </div>
    
    <div class="relative">
      <header class="mb-16 space-y-6">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 border-b-2 border-slate-50 pb-8">
          <div class="space-y-4">
            <span class="inline-flex px-4 py-1 bg-indigo-600 text-white rounded-lg text-xs font-black uppercase tracking-[0.2em] shadow-lg">蒙恩見證稿</span>
            <h3 class="text-4xl md:text-6xl font-black text-slate-900 tracking-tight leading-[1.1]">
              給${getAudienceLabel(sr.audienceType)}的分享
            </h3>
          </div>
          <div class="flex items-center gap-4 text-slate-400 font-black text-sm uppercase tracking-tighter shrink-0">
            <span>${sr.wordCount} 字</span>
            <span class="w-1.5 h-1.5 rounded-full bg-indigo-200"></span>
            <span>AI 風格校準</span>
          </div>
        </div>
      </header>
      
      <article class="whitespace-pre-wrap leading-[1.85] text-slate-900 font-bold text-2xl md:text-4xl lg:text-5xl tracking-tight" style="user-select:text">
        ${sr.testimony}
      </article>
      
      <footer class="mt-24 pt-12 border-t-2 border-slate-50 flex items-center gap-4">
        <div class="w-12 h-1 bg-indigo-600 rounded-full"></div>
        <span class="text-slate-400 text-sm font-black uppercase tracking-widest">主恩滿溢</span>
      </footer>
    </div>
  </div>`;
}

// ─── Global event handlers (attached to window) ───────────────────────────────
window.selectAudience = (val) => {
  state.selectedAudience = val;
  render();
};

window.setTab = (tab) => {
  state.activeTab = tab;
  render();
};

window.cancelProcess = cancelProcess;

window.retryProcess = () => {
  if (state.audioFiles.length > 0) {
    startFullProcess(state.audioFiles, state.selectedAudience);
  }
};

window.copyActiveTab = () => {
  const sr = state.sessionResult;
  if (!sr) return;
  const text = state.activeTab === 'verbatim' ? sr.verbatimTranscript : sr.testimony;
  copyToClipboard(text);
};

window.handleFileUpload = (e) => {
  if (e.target.files && e.target.files.length > 0) {
    const files = Array.from(e.target.files).map(file => ({
      id: `${file.name}-${Date.now()}-${Math.random().toString(36).substr(2,5)}`,
      file,
      previewUrl: URL.createObjectURL(file)
    }));
    state.audioFiles = files;
    startFullProcess(files, state.selectedAudience);
  }
  e.target.value = '';
};

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
